name: Update Google Scholar metrics

on:
  workflow_dispatch:
  schedule:
    # Weekly refresh. Scholar metrics do not need minute-level updates.
    - cron: "0 7 * * 1"

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh Scholar data
        run: python scripts/update_scholar.py
      - name: Commit updated metrics
        run: |
          if git diff --quiet -- _data/scholar.yml; then
            echo "No Scholar metric changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.yml
          git commit -m "Update Google Scholar metrics"
          git push
