# --------------------------------------------
# Basic Site Settings
# --------------------------------------------
locale          : "en-GB"
site_theme      : "default"

title           : "Dr Louis Chen"
title_separator : "-"
name            : "Dr Louis Chen"
description     : "Postdoctoral Research Associate at Imperial College London working on distributed quantum computing, scalable quantum architectures, quantum algorithms, and quantum error correction."

url             : "https://louisanity.github.io"
baseurl         : ""
repository      : "Louisanity/louisanity.github.io"

# Recommended Open Graph image.
# Place this file at /images/site-card.jpg
og_image        : "/images/site-card.jpg"

# --------------------------------------------
# Author profile: left sidebar
# --------------------------------------------
author:
  avatar      : "person_pic.jpg"
  name        : "Dr Louis Chen"
  pronouns    :
  bio         : "Postdoctoral Research Associate at Imperial QuEST, focusing on scalable distributed quantum computing, quantum architectures, quantum algorithms, and quantum error correction."
  location    : "London, UK"
  employer    : "Imperial College London"
  uri         : "https://www.imperial.ac.uk/people/kuan-cheng.chen17"
  email       : "kuan-cheng.chen17@imperial.ac.uk"

  # Academic profiles
  academia      :
  arxiv         :
  googlescholar : "https://scholar.google.com/citations?user=KoUPm0MAAAAJ&hl=en"
  impactstory   :
  orcid         :
  semantic      :
  pubmed        :
  researchgate  :
  scopus        :

  # Repositories / developer platforms
  github        : "Louisanity"
  bitbucket     :
  codepen       :
  dribbble      :
  kaggle        :
  stackoverflow :

  # Social media
  linkedin      : "louis-chen-801214109"
  bluesky       :
  mastodon      :
  medium        :
  twitter       :
  youtube       :

# --------------------------------------------
# Publication category headings
# --------------------------------------------
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# --------------------------------------------
# Site-wide options
# --------------------------------------------
teaser           :
breadcrumbs      : false
words_per_minute : 160
future           : true
read_more        : "disabled"
talkmap_link     : false

# Disable comments globally unless explicitly enabled later
comments:
  provider:
  disqus:
    shortname: ""
  discourse:
    server: ""
  facebook:
    appid: ""
    num_posts: ""
    colorscheme: ""

# Staticman kept for compatibility, but inactive because comments.provider is blank
staticman:
  allowedFields:
    - "name"
    - "email"
    - "url"
    - "message"
  branch: "gh-pages"
  commitMessage: "New comment."
  filename: "comment-{@timestamp}"
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields:
    - "name"
    - "email"
    - "message"
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601"

atom_feed:
  hide: false
  path:

# --------------------------------------------
# SEO / social / analytics
# --------------------------------------------
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

twitter:
  username: ""

facebook:
  username: ""
  app_id: ""
  publisher: ""

social:
  type: "Person"
  name: "Dr Louis Chen"
  links:
    - "https://github.com/Louisanity"
    - "https://scholar.google.com/citations?user=KoUPm0MAAAAJ&hl=en"
    - "https://www.linkedin.com/in/louis-chen-801214109"
    - "https://www.imperial.ac.uk/people/kuan-cheng.chen17"

analytics:
  provider: "false"
  google:
    tracking_id: ""

# --------------------------------------------
# Jekyll build: include / exclude lists
# --------------------------------------------
include:
  - ".htaccess"
  - "_pages"
  - "files"

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - ".asset-cache"
  - ".bundle"
  - ".github"
  - ".jekyll-assets-cache"
  - ".sass-cache"
  - "assets/js/_main.js"
  - "assets/js/plugins"
  - "assets/js/vendor"
  - "CHANGELOG"
  - "Capfile"
  - "config"
  - "Dockerfile"
  - "Gemfile"
  - "Gruntfile.js"
  - "gulpfile.js"
  - "LICENSE"
  - "local"
  - "log"
  - "node_modules"
  - "package.json*"
  - "Rakefile"
  - "README"
  - "README.md"
  - "tmp"
  - "vendor"

keep_files:
  - ".git"
  - ".svn"

encoding     : "utf-8"
markdown_ext : "markdown,mkdown,mkdn,mkd,md"

# --------------------------------------------
# Conversion / Markdown / Sass
# --------------------------------------------
markdown          : kramdown
highlighter       : rouge
excerpt_separator : "\n\n"

kramdown:
  input         : GFM
  hard_wrap     : false
  auto_ids      : true
  footnote_nr   : 1
  entity_output : as_char
  toc_levels    : "1..6"
  smart_quotes  : "lsquo,rsquo,ldquo,rdquo"

sass:
  sass_dir : "_sass"
  style    : compressed

# --------------------------------------------
# Collections, defaults, permalink, timezone
# --------------------------------------------
collections:
  teaching:
    output    : true
    permalink : "/:collection/:path/"

  publications:
    output    : true
    permalink : "/:collection/:path/"

  # Keep the collection name as "Research" to match the existing _Research folder.
  # Public URLs are lower-case for a cleaner academic website.
  Research:
    output    : true
    permalink : "/research/:path/"

  talks:
    output    : true
    permalink : "/:collection/:path/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout         : single
      author_profile : true
      read_time      : true
      comments       : false
      share          : false
      related        : true

  - scope:
      path: ""
      type: pages
    values:
      layout         : single
      author_profile : true
      comments       : false
      share          : false

  - scope:
      path: ""
      type: teaching
    values:
      layout         : single
      author_profile : true
      comments       : false
      share          : false

  - scope:
      path: ""
      type: publications
    values:
      layout         : single
      author_profile : true
      comments       : false
      share          : false

  - scope:
      path: ""
      type: Research
    values:
      layout         : single
      author_profile : true
      comments       : false
      share          : false

  - scope:
      path: ""
      type: talks
    values:
      layout         : talk
      author_profile : true
      comments       : false
      share          : false

permalink : "/:categories/:title/"
timezone  : Europe/London

# --------------------------------------------
# Plugins & whitelist: GitHub Pages-compatible
# --------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# --------------------------------------------
# Archives & HTML compression
# --------------------------------------------
category_archive:
  type : liquid
  path : "/categories/"

tag_archive:
  type : liquid
  path : "/tags/"

compress_html:
  clippings : all
  ignore:
    envs:
      - development
